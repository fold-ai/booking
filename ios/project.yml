# XcodeGen specification для Drevito iOS app.
# Note: target name "FieldbaseCrew" — це ВНУТРІШНЯ технічна назва (через історію).
# CFBundleDisplayName = "Drevito" — це те що видно під іконкою на iPhone.
# Bundle ID = com.drevito.app — must match the Apple App ID + Supabase Apple Client IDs.
#
# Генерує FieldbaseCrew.xcodeproj командою: xcodegen generate
# Встановити XcodeGen один раз: brew install xcodegen

name: FieldbaseCrew
options:
  bundleIdPrefix: com.drevito
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.20.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  FieldbaseCrew:
    type: application
    platform: iOS
    sources:
      - path: Sources/FieldbaseCrew
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Drevito
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: We use your location to show navigation to job sites.
        # !!! ВАЖЛИВО: підстав свої значення з Supabase
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        # Google Sign-In — values come from Secrets.xcconfig (iOS OAuth client).
        # GIDClientID = the iOS client ID, e.g. 1234-abc.apps.googleusercontent.com
        # The URL scheme below is its REVERSED form, e.g. com.googleusercontent.apps.1234-abc
        GIDClientID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
    entitlements:
      path: Resources/Drevito.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drevito.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Прочитає Secrets.xcconfig якщо існує (для credentials)
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
